<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>KPM 5.0.1 空間座標穩定版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
        #input_video { display: none; }
        
        #status-monitor { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.85); display: flex; 
            justify-content: space-around; align-items: center; 
            padding: 12px 0; border-bottom: 2px solid #0f0; 
            z-index: 300; box-sizing: border-box; 
        }
        .status-item { flex: 1; text-align: center; border-right: 1px solid #333; }
        .status-value { font-size: 16px; font-weight: bold; color: #ffff00; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 400; text-align: center; padding: 20px; box-sizing: border-box; }
        .modal { background: #1a1a1a; border: 2px solid #0f0; border-radius: 24px; padding: 30px; max-width: 500px; width: 95%; }
        
        /* 啟動按鈕狀態 */
        button { border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn-inactive { background: #444; color: #888; cursor: not-allowed; }
        .btn-active { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }

        input { background: #333; border: 1px solid #0f0; color: #fff; padding: 12px; border-radius: 8px; font-size: 18px; width: 85%; margin: 10px 0; text-align: center; }
        
        #leveler-box { margin: 20px 0; padding: 15px; border: 1px solid #444; border-radius: 15px; background: #000; }
        .level-indicator { font-weight: bold; font-size: 20px; margin-top: 5px; }

        .countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; color: #fff; z-index: 150; pointer-events: none; display: none; }
        #dynamic-risk-ui { position: absolute; bottom: 18%; width: 100%; text-align: center; color: #ff5555; font-size: 18px; font-weight: bold; z-index: 310; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="step-prepare" class="overlay">
        <div class="modal">
            <h2 style="color:#0f0">KPM 5.0.1 空間座標系統</h2>
            <input type="text" id="patient-name" placeholder="個案姓名" value="蔡忠憲">
            <div style="display:flex; justify-content: center; gap: 10px;">
                <input type="number" id="patient-height" placeholder="身高(cm)" value="170" style="width:80%;">
            </div>
            
            <div id="leveler-box">
                <div style="color:#aaa; font-size: 13px;">設備垂直狀態 (目標 90°)</div>
                <div id="pitch-display" class="level-indicator" style="color: #ff5555;">等待感測器...</div>
                <p id="pitch-hint" style="color:#666; font-size: 12px; margin-top: 8px;">請先點擊下方按鈕啟動感測器</p>
            </div>

            <button id="btn-sensor" onclick="requestSensor()" style="background:#0f0; color:#000;">1. 啟動水平感測</button>
            <button id="btn-start" onclick="startFlow()" class="btn-inactive" disabled>2. 開始檢測</button>
        </div>
    </div>

    <div id="status-monitor" style="display:none;">
        <div class="status-item"><div id="val-angle" class="status-value">0.0°</div><div style="font-size:10px; color:#aaa;">3D 夾角</div></div>
        <div class="status-item"><div id="val-risk" class="status-value">---</div><div style="font-size:10px; color:#aaa;">風險</div></div>
        <div class="status-item"><div id="val-marker" class="status-value">偵測中</div><div style="font-size:10px; color:#aaa;">點位</div></div>
    </div>

    <div id="countdown-display" class="countdown">5</div>
    <div id="dynamic-risk-ui"></div>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btnStart = document.getElementById('btn-start');
        const btnSensor = document.getElementById('btn-sensor');
        const pitchDisplay = document.getElementById('pitch-display');
        const pitchHint = document.getElementById('pitch-hint');
        
        let currentMode = 'IDLE', isStable = false, stabilityCounter = 0, lastAngle = 0;
        let devicePitch = 0; 
        let smaBuffer = [], reportData = { height: 170 };

        // 1. 校正導引優化
        window.requestSensor = async () => {
            try {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') { setupOrientation(); }
                } else { setupOrientation(); }
            } catch (e) { alert("無法存取感測器，請使用 HTTPS 連線或檢查隱私設定。"); }
        };

        function setupOrientation() {
            window.addEventListener('deviceorientation', (event) => {
                devicePitch = event.beta;
                pitchDisplay.innerText = `${devicePitch.toFixed(1)}°`;
                
                // 判斷是否接近 90 度 (垂直)
                if (Math.abs(devicePitch - 90) < 2) {
                    pitchDisplay.style.color = "#0f0";
                    pitchHint.innerText = "✅ 設備已垂直，可以開始。";
                    btnStart.disabled = false;
                    btnStart.className = "btn-active";
                } else {
                    pitchDisplay.style.color = "#ff5555";
                    pitchHint.innerText = "請前後調整手機，使其接近 90°";
                    btnStart.disabled = true;
                    btnStart.className = "btn-inactive";
                }
            });
            btnSensor.innerText = "✅ 感測器已啟動";
            btnSensor.style.background = "#444"; btnSensor.style.color = "#888";
        }

        // 2. 抗震型 3D 向量運算
        function calculate3DAngle(p1, p2) {
            const pitchRad = (devicePitch - 90) * Math.PI / 180;
            // 坐標旋轉校正
            const y1_corr = p1.y * Math.cos(pitchRad) - p1.z * Math.sin(pitchRad);
            const y2_corr = p2.y * Math.cos(pitchRad) - p2.z * Math.sin(pitchRad);

            const dx = p1.x - p2.x;
            const dy = y1_corr - y2_corr;
            const dz = p1.z - p2.z;

            // 空間模長 (引入深度 Z)
            const mag = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if (mag === 0) return 0;
            return Math.acos(Math.abs(dy) / mag) * 180 / Math.PI;
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults((results) => {
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks && currentMode !== 'IDLE') {
                const lms = results.poseLandmarks;
                const isInFrame = (p) => p.x > 0 && p.x < 1 && p.y > 0 && p.y < 1 && p.visibility > 0.6;
                const isShouldersInFrame = isInFrame(lms[11]) && isInFrame(lms[12]);
                
                document.getElementById('val-marker').innerText = isShouldersInFrame ? "✅ 正常" : "❌ 遺失";

                let currentAngle = 0;
                if (currentMode === 'FRONTAL') {
                    currentAngle = calculate3DAngle(lms[0], {x:(lms[11].x+lms[12].x)/2, y:(lms[11].y+lms[12].y)/2, z:(lms[11].z+lms[12].z)/2});
                } else if (currentMode === 'LATERAL') {
                    const side = lms[11].visibility > lms[12].visibility ? 11 : 12;
                    currentAngle = calculate3DAngle(lms[side === 11 ? 7 : 8], lms[side]);
                }

                // 3. 強化濾波：SMA 緩衝區增加到 40 幀
                smaBuffer.push(currentAngle);
                if(smaBuffer.length > 40) smaBuffer.shift();
                const avgAngle = smaBuffer.reduce((a, b) => a + b, 0) / smaBuffer.length;
                
                document.getElementById('val-angle').innerText = `${Math.abs(avgAngle).toFixed(1)}°`;

                // 鬆綁穩定判定閾值至 0.8
                if (isShouldersInFrame) {
                    if (Math.abs(avgAngle - lastAngle) < 0.8) {
                        stabilityCounter++;
                        if (stabilityCounter >= 35 && !isStable) { isStable = true; startCountdown(); }
                    } else { if(!isStable) stabilityCounter = 0; }
                }
                lastAngle = avgAngle;
                drawConnectors(canvasCtx, lms, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            }
            canvasCtx.restore();
        });

        window.startFlow = async () => {
            document.getElementById('step-prepare').style.display = 'none';
            document.getElementById('status-monitor').style.display = 'flex';
            currentMode = 'FRONTAL';
            const camera = new Camera(videoElement, {onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720});
            camera.start();
        };

        function startCountdown() {
            const cd = document.getElementById('countdown-display');
            cd.style.display = 'block';
            let timer = 5; cd.innerText = timer;
            let itv = setInterval(() => {
                timer--; cd.innerText = timer;
                if (timer <= 0) { clearInterval(itv); cd.style.display = 'none'; captureStep(); }
            }, 1000);
        }

        function captureStep() {
            // (後續截圖與報告邏輯...)
            alert("檢測完成，請查看報告");
            location.reload();
        }
    </script>
</body>
</html>

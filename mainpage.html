<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>康富物理治療體態檢測系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
        #input_video { display: none; }
        
        #status-monitor { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.85); display: flex; 
            justify-content: space-around; align-items: center; 
            padding: 12px 0; border-bottom: 2px solid #0f0; 
            z-index: 300; box-sizing: border-box; 
        }
        .status-item { flex: 1; text-align: center; border-right: 1px solid #333; }
        .status-item:last-child { border-right: none; }
        .status-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .status-value { font-size: 16px; font-weight: bold; color: #ffff00; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 400; text-align: center; padding: 20px; box-sizing: border-box; }
        .modal { background: #1a1a1a; border: 2px solid #0f0; border-radius: 24px; padding: 25px; max-width: 500px; width: 95%; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn-inactive { background: #444; color: #888; cursor: not-allowed; }
        
        /* 確保 placeholder 完整顯示的表單配置 */
        input { background: #333; border: 1px solid #0f0; color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; margin: 10px 0; text-align: center; }
        
        #leveler-box { margin: 15px 0; padding: 12px; border: 1px solid #444; border-radius: 15px; background: #000; }
        #dynamic-risk-ui { position: absolute; bottom: 18%; width: 100%; text-align: center; color: #ff5555; font-size: 18px; font-weight: bold; z-index: 310; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #rot-warning { position: absolute; top: 15%; width: 100%; text-align: center; color: #ff5555; font-size: 16px; font-weight: bold; z-index: 310; display: none; animation: blink 1.5s infinite; }

        .countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; color: #fff; z-index: 150; pointer-events: none; display: none; }
        
        .guide-line { position: absolute; left: 0; width: 100%; border-top: 2px dashed rgba(255,255,255,0.4); z-index: 90; display: flex; justify-content: center; pointer-events: none; }
        .top-line { top: 20%; }
        .bottom-line { bottom: 10%; border-top: 2px dashed rgba(100,255,100,0.4); }
        .guide-text { background: rgba(0, 0, 0, 0.6); padding: 3px 12px; font-size: 13px; color: #fff; border-radius: 5px; transform: translateY(-50%); }
        .red-dot { position: absolute; width: 12px; height: 12px; background-color: #ff0000; border-radius: 50%; box-shadow: 0 0 10px #ff0000; animation: blink 2s infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }
        
        #report-img-container img { width: 100%; border: 1px solid #fff; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="step-prepare" class="overlay">
        <div class="modal">
            <h2 style="color:#0f0">康富物理治療體態檢測系統</h2>
            <p style="color:#ccc">個案資訊登錄</p>
            
            <input type="text" id="patient-name" placeholder="請輸入姓名" value="">
            <div style="display:flex; justify-content: space-between; gap: 10px;">
                <input type="text" id="patient-id" placeholder="請輸入測試序號如001" value="" style="width:48%;">
                <input type="number" id="patient-height" placeholder="請輸入身高(公分)" value="" style="width:48%;">
            </div>
            
            <div id="leveler-box">
                <div style="color:#aaa; font-size: 12px;">設備水平校正 (Pitch: <span id="pitch-val">90.0</span>°)</div>
                <div id="pitch-status" style="color: #ff5555; font-weight: bold; margin-top: 5px;">請授權感測器</div>
            </div>

            <button id="btn-sensor" onclick="requestSensor()">1. 授權感測器</button>
            <button id="btn-start" class="btn-inactive" onclick="startFlow()" disabled>2. 開始檢測流程</button>
        </div>
    </div>

    <div id="status-monitor" style="display:none;">
        <div class="status-item"><div class="status-label">模式</div><div id="val-mode" class="status-value">---</div></div>
        <div class="status-item"><div class="status-label">角度</div><div id="val-angle" class="status-value">0.0°</div></div>
        <div class="status-item"><div class="status-label">姿態判讀</div><div id="val-label" class="status-value">---</div></div>
        <div class="status-item"><div class="status-label">點位狀態</div><div id="val-marker" class="status-value">偵測中</div></div>
    </div>

    <div id="rot-warning">⚠️ 偵測到身體明顯旋轉，可能影響精度</div>

    <div id="step-next-alert" class="overlay" style="display:none;">
        <div class="modal">
            <h2 id="next-title">檢測完成</h2>
            <p id="next-msg" style="color:#ccc;"></p>
            <button id="next-btn"></button>
        </div>
    </div>

    <div id="countdown-display" class="countdown">5</div>
    
    <div class="guide-line top-line"><div class="red-dot"></div><span class="guide-text" style="margin-top: 35px;">頭頂請對齊紅點</span></div>
    <div id="dynamic-risk-ui"></div>
    <div class="guide-line bottom-line"><span class="guide-text">距離偵測範圍</span></div>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <canvas id="report-gen-canvas" width="800" height="1200" style="display:none;"></canvas>

    <div id="report-preview-layer" class="overlay" style="display:none;">
        <div class="modal">
            <h2 style="color:#0f0">個案檢測報告</h2>
            <div id="report-img-container"></div>
            <p style="color:#ffff00; font-size: 14px; margin-top:10px;">請點擊分享按鈕儲存至相簿</p>
            <button onclick="shareReport()">儲存 / 分享報告圖</button>
            <button onclick="location.reload()" style="background:#444; color:white;">完成</button>
        </div>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btnStart = document.getElementById('btn-start');
        
        let currentMode = 'IDLE', isStable = false, stabilityCounter = 0, lastAngle = 0;
        let devicePitch = 90;
        let smaBuffer = [], reportData = { name: "", id: "", height: "", date: "", frontal: null, lateral: null }, finalBlob = null;
        
        // 全域變數：確保快門按下時擷取最即時的資料，與中斷防呆機制
        let countdownInterval = null;
        let lockedAngle = 0;
        let liveAngle = 0, liveLabel = "", liveRisk = "";

        function normalizeAngle(angle) {
            while (angle > 180) angle -= 360;
            while (angle < -180) angle += 360;
            return angle;
        }

        function get3DPoint(p) {
            const cw = canvasElement.width || 1080;
            const ch = canvasElement.height || 1920;
            const px = p.x * cw;
            const py = p.y * ch;
            const pz = p.z * cw; 
            
            const pitchRad = (devicePitch - 90) * Math.PI / 180;
            return {
                x: px,
                y: py * Math.cos(pitchRad) - pz * Math.sin(pitchRad),
                z: py * Math.sin(pitchRad) + pz * Math.cos(pitchRad)
            };
        }

        window.requestSensor = async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') { setupOrientation(); }
            } else { setupOrientation(); }
        };

        function setupOrientation() {
            window.addEventListener('deviceorientation', (e) => {
                devicePitch = e.beta;
                document.getElementById('pitch-val').innerText = devicePitch.toFixed(1);
                const status = document.getElementById('pitch-status');
                if (Math.abs(devicePitch - 90) < 5) {
                    status.innerText = "✅ 設備就緒"; status.style.color = "#0f0";
                    btnStart.disabled = false; btnStart.classList.remove('btn-inactive');
                } else {
                    status.innerText = "⚠️ 請微調垂直度"; status.style.color = "#ff5555";
                    btnStart.disabled = true; btnStart.classList.add('btn-inactive');
                }
            });
            const btnSens = document.getElementById('btn-sensor');
            btnSens.innerText = "✅ 已授權"; btnSens.style.background = "#444";
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults((results) => {
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks && currentMode !== 'IDLE') {
                const lms = results.poseLandmarks;
                
                const markerStatus = document.getElementById('val-marker');
                const checkIn = (p) => p.x > 0 && p.x < 1 && p.y > 0 && p.y < 1 && p.visibility > 0.6;
                const isShouldersInFrame = checkIn(lms[11]) && checkIn(lms[12]);
                
                if (!isShouldersInFrame) {
                    markerStatus.innerText = "❌ 遺失"; markerStatus.style.color = "#ff5555";
                } else {
                    markerStatus.innerText = "✅ 正常"; markerStatus.style.color = "#00ff00";
                }

                let currentAngle = 0, label = "", modeTitle = "", riskL = "", isRotated = false;

                if (currentMode === 'FRONTAL') {
                    const e2 = get3DPoint(lms[2]), e5 = get3DPoint(lms[5]);
                    const s11 = get3DPoint(lms[11]), s12 = get3DPoint(lms[12]);

                    const headRad = Math.atan2(e5.y - e2.y, e5.x - e2.x);
                    const shRad = Math.atan2(s12.y - s11.y, s12.x - s11.x);
                    currentAngle = normalizeAngle((headRad - shRad) * 180 / Math.PI);
                    
                    const shoulderMidX = (lms[11].x + lms[12].x) / 2;
                    const absA = Math.abs(currentAngle);
                    if (absA > 1.5) {
                        label = lms[0].x < shoulderMidX ? "右偏 (R)" : "左偏 (L)";
                    } else {
                        label = "中立";
                    }
                    modeTitle = "頸肩";
                    
                    if (absA >= 7.5) riskL = "風險 高"; else if (absA >= 5) riskL = "風險 中"; else riskL = "風險 低";

                    const shoulderWidth3D = Math.sqrt((s12.x - s11.x)**2 + (s12.z - s11.z)**2);
                    isRotated = Math.abs(s12.z - s11.z) > (shoulderWidth3D * 0.35);

                } else if (currentMode === 'LATERAL') {
                    const sideIdx = lms[11].visibility > lms[12].visibility ? 11 : 12;
                    const earIdx = sideIdx === 11 ? 7 : 8;
                    
                    const sh = get3DPoint(lms[sideIdx]);
                    const ear = get3DPoint(lms[earIdx]);
                    
                    const s11 = get3DPoint(lms[11]), s12 = get3DPoint(lms[12]);
                    const sx = s11.x - s12.x;
                    const sz = s11.z - s12.z;
                    
                    let fx = -sz, fz = sx;
                    const flen = Math.sqrt(fx*fx + fz*fz);
                    if (flen > 0) { fx /= flen; fz /= flen; } else { fx = 1; fz = 0; }

                    const nx = ear.x - sh.x;
                    const ny = ear.y - sh.y;
                    const nz = ear.z - sh.z;

                    const forward_dist = nx * fx + nz * fz;
                    currentAngle = Math.atan2(forward_dist, Math.abs(ny)) * 180 / Math.PI;
                    
                    const absA = Math.abs(currentAngle); 

                    const nose_x = lms[0].x;
                    const ear_x = lms[earIdx].x;
                    const sh_x = lms[sideIdx].x;

                    const isFacingLeft = nose_x < ear_x; 
                    let isForward = false;

                    if (isFacingLeft) {
                        isForward = ear_x < sh_x; 
                    } else {
                        isForward = ear_x > sh_x; 
                    }

                    if (absA > 2) {
                        label = isForward ? "前傾 (Fwd)" : "後傾 (Bwd)";
                    } else {
                        label = "中立";
                    }
                    
                    modeTitle = "頸胸";
                    if (absA >= 15) riskL = "風險 高"; else if (absA >= 5) riskL = "風險 中"; else riskL = "風險 低";

                    isRotated = Math.abs(lms[11].x - lms[12].x) > 0.2; 
                }

                document.getElementById('rot-warning').style.display = isRotated ? 'block' : 'none';

                smaBuffer.push(currentAngle);
                if(smaBuffer.length > 25) smaBuffer.shift(); 
                const avgAngle = smaBuffer.reduce((a, b) => a + b, 0) / smaBuffer.length;
                
                document.getElementById('val-mode').innerText = modeTitle;
                document.getElementById('val-angle').innerText = `${Math.abs(avgAngle).toFixed(1)}°`;
                document.getElementById('val-label').innerText = label;
                document.getElementById('dynamic-risk-ui').innerText = riskL;

                // 隨時更新「即時變數」，確保快門按下時擷取的是精準的最後一刻
                liveAngle = avgAngle;
                liveLabel = label;
                liveRisk = riskL;

                // --- 穩定度與防飄移核心邏輯 ---
                if (isShouldersInFrame) {
                    const angleDiff = Math.abs(avgAngle - lastAngle);
                    
                    if (!isStable) {
                        // 1. 更嚴謹的進入倒數門檻 (縮小震幅限制)
                        const enterThreshold = currentMode === 'FRONTAL' ? 0.3 : 0.8;
                        if (angleDiff < enterThreshold) {
                            stabilityCounter++;
                            if (stabilityCounter >= 40) { 
                                isStable = true; 
                                lockedAngle = avgAngle; // 鎖定啟動時的基準角度
                                startCountdown(); 
                            }
                        } else { 
                            stabilityCounter = 0; 
                        }
                    } else {
                        // 2. 倒數期間的移動偵測 (Anti-Drift 取消機制)
                        const drift = Math.abs(avgAngle - lockedAngle);
                        const cancelThreshold = currentMode === 'FRONTAL' ? 1.5 : 3.0;
                        if (drift > cancelThreshold) {
                            // 若飄移過大，立即中斷倒數重新來過
                            clearInterval(countdownInterval);
                            document.getElementById('countdown-display').style.display = 'none';
                            isStable = false;
                            stabilityCounter = 0;
                        }
                    }
                } else {
                    // 若倒數期間點位遺失，立刻中斷
                    if (isStable) {
                        clearInterval(countdownInterval);
                        document.getElementById('countdown-display').style.display = 'none';
                        isStable = false;
                    }
                    stabilityCounter = 0; 
                }
                lastAngle = avgAngle;
                drawConnectors(canvasCtx, lms, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            }
            canvasCtx.restore();
        });

        window.startFlow = async () => {
            reportData.name = document.getElementById('patient-name').value || "未命名個案";
            reportData.id = document.getElementById('patient-id').value || "N/A";
            reportData.height = document.getElementById('patient-height').value; 
            const now = new Date();
            reportData.date = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            document.getElementById('step-prepare').style.display = 'none';
            document.getElementById('status-monitor').style.display = 'flex';
            currentMode = 'FRONTAL';
            const camera = new Camera(videoElement, {onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720});
            camera.start();
        };

        function startCountdown() {
            const cd = document.getElementById('countdown-display');
            cd.style.display = 'block';
            let timer = 5; cd.innerText = timer;
            countdownInterval = setInterval(() => {
                timer--; cd.innerText = timer;
                if (timer <= 0) { 
                    clearInterval(countdownInterval); 
                    cd.style.display = 'none'; 
                    // 傳入 T=0 秒 (快門按下瞬間) 的即時資料
                    captureStep(liveAngle, liveLabel, liveRisk); 
                }
            }, 1000);
        }

        function captureStep(angle, label, risk) {
            const snapshot = canvasElement.toDataURL("image/jpeg", 0.9);
            const absA = Math.abs(angle);
            if (currentMode === 'FRONTAL') {
                reportData.frontal = { img: snapshot, angle: absA.toFixed(1), label: label, risk: risk };
                currentMode = 'IDLE';
                
                document.getElementById('next-title').innerText = "正面完成";
                document.getElementById('next-msg').innerText = "請引導個案轉向「側面」。";
                const btn = document.getElementById('next-btn');
                btn.innerText = "進入側面檢測";
                btn.style.background = "#0f0"; btn.style.color = "#000";
                btn.onclick = () => {
                    document.getElementById('step-next-alert').style.display = 'none';
                    currentMode = 'LATERAL'; stabilityCounter = 0; isStable = false; smaBuffer = [];
                };
                document.getElementById('step-next-alert').style.display = 'flex';
            } else {
                reportData.lateral = { img: snapshot, angle: absA.toFixed(1), label: label, risk: risk };
                currentMode = 'IDLE'; generateReport();
            }
        }

        async function generateReport() {
            const c = document.getElementById('report-gen-canvas');
            const ctx = c.getContext('2d');
            ctx.fillStyle = "white"; ctx.fillRect(0,0,800,1200);
            ctx.fillStyle = "#004d40"; ctx.fillRect(0,0,800,110);
            
            ctx.fillStyle = "white"; ctx.font = "bold 38px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("康富物理治療體態檢測報告", 400, 70); 
            ctx.textAlign = "left"; ctx.fillStyle = "#333"; ctx.font = "22px sans-serif";
            
            const heightText = reportData.height ? ` (${reportData.height}cm)` : "";
            ctx.fillText(`個案: ${reportData.name}${heightText}`, 40, 160);
            ctx.fillText(`日期: ${reportData.date} / 序號: ${reportData.id}`, 450, 160);
            
            const loadImg = (src) => new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
            const drawBoxedImage = (img, x, y, w, h) => {
                const imgAspect = img.width / img.height;
                let drawW = w, drawH = w / imgAspect;
                if (drawH > h) { drawH = h; drawW = h * imgAspect; }
                const offsetX = x + (w - drawW) / 2;
                const offsetY = y + (h - drawH) / 2;
                ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.strokeRect(offsetX-2, offsetY-2, drawW+4, drawH+4);
                ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
            };

            const imgF = await loadImg(reportData.frontal.img);
            drawBoxedImage(imgF, 40, 210, 340, 480);
            ctx.fillStyle = "#004d40"; ctx.font = "bold 22px sans-serif"; ctx.fillText("【正面：頸肩夾角】", 40, 730);
            ctx.fillStyle = "#333"; ctx.font = "22px sans-serif";
            ctx.fillText(`偏移狀態: ${reportData.frontal.label}`, 40, 765);
            ctx.fillText(`量測角度: ${reportData.frontal.angle}° (${reportData.frontal.risk})`, 40, 800);

            const imgL = await loadImg(reportData.lateral.img);
            drawBoxedImage(imgL, 420, 210, 340, 480);
            ctx.fillStyle = "#004d40"; ctx.font = "bold 22px sans-serif"; ctx.fillText("【側面：頸胸夾角】", 420, 730);
            ctx.fillStyle = "#333"; ctx.font = "22px sans-serif";
            ctx.fillText(`姿態判讀: ${reportData.lateral.label}`, 420, 765);
            ctx.fillText(`量測角度: ${reportData.lateral.angle}° (${reportData.lateral.risk})`, 420, 800);
            
            ctx.fillStyle = "#aaa"; ctx.font = "italic 16px sans-serif"; ctx.fillText("康富物理治療體系 版權所有。(v6.8 防飄移同步版)", 40, 1160);

            const finalDataUrl = c.toDataURL("image/jpeg", 0.9);
            const reportImg = new Image(); reportImg.src = finalDataUrl;
            document.getElementById('report-img-container').innerHTML = '';
            document.getElementById('report-img-container').appendChild(reportImg);
            document.getElementById('report-preview-layer').style.display = 'flex';
            const res = await fetch(finalDataUrl); finalBlob = await res.blob();
        }

        window.shareReport = async () => {
            const fileName = `${reportData.date}-${reportData.name}-${reportData.id}.jpg`;
            const file = new File([finalBlob], fileName, { type: 'image/jpeg' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: '康富檢測報告' }); } catch (err) {}
            } else { alert("長按圖片儲存影像。"); }
        };
    </script>
</body>
</html>

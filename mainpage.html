<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>康富物理治療體態檢測系統 v5.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
        #input_video { display: none; }
        
        #status-monitor { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.85); display: flex; 
            justify-content: space-around; align-items: center; 
            padding: 12px 0; border-bottom: 2px solid #0f0; 
            z-index: 300; box-sizing: border-box; 
        }
        .status-item { flex: 1; text-align: center; border-right: 1px solid #333; }
        .status-item:last-child { border-right: none; }
        .status-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .status-value { font-size: 16px; font-weight: bold; color: #ffff00; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 400; text-align: center; padding: 20px; box-sizing: border-box; }
        .modal { background: #1a1a1a; border: 2px solid #0f0; border-radius: 24px; padding: 25px; max-width: 500px; width: 95%; }
        
        button { border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn-sensor { background: #0f0; color: #000; }
        .btn-start-inactive { background: #444; color: #888; cursor: not-allowed; }
        .btn-start-active { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }

        input { background: #333; border: 1px solid #0f0; color: #fff; padding: 12px; border-radius: 8px; font-size: 18px; width: 85%; margin: 10px 0; text-align: center; }
        
        #leveler-box { margin: 15px 0; padding: 12px; border: 1px solid #444; border-radius: 15px; background: #000; }
        #dynamic-risk-ui { position: absolute; bottom: 18%; width: 100%; text-align: center; color: #ff5555; font-size: 18px; font-weight: bold; z-index: 310; text-shadow: 2px 2px 4px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="step-prepare" class="overlay">
        <div class="modal">
            <h2 style="color:#0f0">康富物理治療體態檢測系統</h2>
            <input type="text" id="patient-name" placeholder="個案姓名" value="蔡忠憲">
            <div style="display:flex; justify-content: center; gap: 10px;">
                <input type="text" id="patient-id" placeholder="序號" value="001" style="width:35%;">
                <input type="number" id="patient-height" placeholder="身高(cm)" value="170" style="width:45%;">
            </div>
            <div id="leveler-box">
                <div style="color:#aaa; font-size: 12px;">設備水平校正 (Pitch: <span id="pitch-val">90.0</span>°)</div>
                <div id="pitch-status" style="color: #ff5555; font-weight: bold; margin-top: 5px;">請授權感測器</div>
            </div>
            <button id="btn-sensor" class="btn-sensor" onclick="requestSensor()">1. 授權感測器</button>
            <button id="btn-start" class="btn-start-inactive" onclick="startFlow()" disabled>2. 開始檢測</button>
        </div>
    </div>

    <div id="status-monitor" style="display:none;">
        <div class="status-item"><div class="status-label">模式</div><div id="val-mode" class="status-value">---</div></div>
        <div class="status-item"><div class="status-label">真 3D 角度</div><div id="val-angle" class="status-value">0.0°</div></div>
        <div class="status-item"><div class="status-label">旋轉預警</div><div id="val-rotation" class="status-value">正常</div></div>
        <div class="status-item"><div class="status-label">肩膀狀態</div><div id="val-marker" class="status-value">偵測中</div></div>
    </div>

    <div id="dynamic-risk-ui"></div>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btnStart = document.getElementById('btn-start');
        
        let currentMode = 'IDLE', isStable = false, stabilityCounter = 0, lastAngle = 0;
        let devicePitch = 90; 
        let smaBuffer = [];

        // --- 真 3D 運算引擎 ---
        function calculateTrue3DAngle(p1, p2) {
            const aspect = 1280 / 720;
            const pitchRad = (devicePitch - 90) * Math.PI / 180;

            // 1. 空間座標旋轉補償 (Rotation Matrix on X-Axis)
            // 將 MediaPipe 的點位旋轉，補償手機的俯仰角，建立絕對垂直座標系
            const rotatePoint = (p) => {
                const y = p.y;
                const z = p.z;
                return {
                    x: p.x * aspect, // 修正長寬比
                    y: y * Math.cos(pitchRad) - z * Math.sin(pitchRad),
                    z: y * Math.sin(pitchRad) + z * Math.cos(pitchRad)
                };
            };

            const pt1 = rotatePoint(p1);
            const pt2 = rotatePoint(p2);

            // 2. 空間向量計算
            const dx = pt1.x - pt2.x;
            const dy = pt1.y - pt2.y;
            const dz = pt1.z - pt2.z;

            // 3. 計算旋轉度 (左右深度的偏差)
            const rotationOffset = Math.abs(dz); 
            document.getElementById('val-rotation').innerText = rotationOffset > 0.1 ? "⚠️ 旋轉" : "正常";
            document.getElementById('val-rotation').style.color = rotationOffset > 0.1 ? "#ff5555" : "#0f0";

            // 4. 計算 3D 空間向量相對於絕對垂直線 (0, 1, 0) 的夾角
            // 利用空間向量餘弦：Angle = arccos( |dy| / sqrt(dx^2 + dy^2 + dz^2) )
            const mag = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if (mag === 0) return 0;
            
            return Math.acos(Math.abs(dy) / mag) * 180 / Math.PI;
        }

        window.requestSensor = async () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') { setupOrientation(); }
            } else { setupOrientation(); }
        };

        function setupOrientation() {
            window.addEventListener('deviceorientation', (event) => {
                devicePitch = event.beta;
                document.getElementById('pitch-val').innerText = devicePitch.toFixed(1);
                const status = document.getElementById('pitch-status');
                if (Math.abs(devicePitch - 90) < 3) {
                    status.innerText = "✅ 設備已垂直"; status.style.color = "#0f0";
                    btnStart.disabled = false; btnStart.className = "btn-start-active";
                } else {
                    status.innerText = "⚠️ 請微調垂直度"; status.style.color = "#ff5555";
                    btnStart.disabled = true; btnStart.className = "btn-start-inactive";
                }
            });
            document.getElementById('btn-sensor').innerText = "✅ 感測器授權完成";
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults((results) => {
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks && currentMode !== 'IDLE') {
                const lms = results.poseLandmarks;
                const checkValid = (p) => p.x >= 0 && p.x <= 1 && p.y >= 0 && p.y <= 1 && p.visibility > 0.6;
                const isShouldersInFrame = checkValid(lms[11]) && checkValid(lms[12]);
                document.getElementById('val-marker').innerText = isShouldersInFrame ? "✅ 正常" : "❌ 遺失";

                let currentAngle = 0, riskL = "";
                if (currentMode === 'FRONTAL') {
                    const shoulderMid = {x:(lms[11].x+lms[12].x)/2, y:(lms[11].y+lms[12].y)/2, z:(lms[11].z+lms[12].z)/2};
                    currentAngle = calculateTrue3DAngle(lms[0], shoulderMid);
                    if (currentAngle >= 7.5) riskL = "高"; else if (currentAngle >= 5) riskL = "中"; else riskL = "低";
                } else if (currentMode === 'LATERAL') {
                    const side = lms[11].visibility > lms[12].visibility ? 11 : 12;
                    currentAngle = calculateTrue3DAngle(lms[side === 11 ? 7 : 8], lms[side]);
                    if (currentAngle >= 15) riskL = "高"; else if (currentAngle >= 5) riskL = "中"; else riskL = "低";
                }

                smaBuffer.push(currentAngle);
                if(smaBuffer.length > 40) smaBuffer.shift(); 
                const avgAngle = smaBuffer.reduce((a, b) => a + b, 0) / smaBuffer.length;
                
                document.getElementById('val-mode').innerText = currentMode==='FRONTAL'?'頸肩':'頸胸';
                document.getElementById('val-angle').innerText = `${avgAngle.toFixed(1)}°`;
                document.getElementById('dynamic-risk-ui').innerText = `風險評估：${riskL}`;

                if (isShouldersInFrame) {
                    // 只有在穩定且沒有嚴重旋轉的情況下才倒數
                    const rotationVal = Math.abs(lms[11].z - lms[12].z);
                    if (Math.abs(avgAngle - lastAngle) < 0.6 && rotationVal < 0.15) {
                        stabilityCounter++;
                        if (stabilityCounter >= 45 && !isStable) { isStable = true; alert("數據鎖定，正在擷取..."); }
                    } else { if(!isStable) stabilityCounter = 0; }
                }
                lastAngle = avgAngle;
                drawConnectors(canvasCtx, lms, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            }
            canvasCtx.restore();
        });

        window.startFlow = async () => {
            document.getElementById('step-prepare').style.display = 'none';
            document.getElementById('status-monitor').style.display = 'flex';
            currentMode = 'FRONTAL';
            const camera = new Camera(videoElement, {onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720});
            camera.start();
        };
    </script>
</body>
</html>

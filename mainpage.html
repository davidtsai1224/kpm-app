<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>康富物理治療檢測系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #output_canvas { max-width: 100%; max-height: 100%; transform: scaleX(-1); }
        #input_video { display: none; }
        
        /* 橫向置頂面板 */
        #status-monitor { 
            position: absolute; top: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.85); display: flex; 
            justify-content: space-around; align-items: center; 
            padding: 12px 0; border-bottom: 2px solid #0f0; 
            z-index: 300; box-sizing: border-box; 
        }
        .status-item { flex: 1; text-align: center; border-right: 1px solid #333; }
        .status-item:last-child { border-right: none; }
        .status-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .status-value { font-size: 16px; font-weight: bold; color: #ffff00; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 400; text-align: center; padding: 20px; box-sizing: border-box; }
        .modal { background: #1a1a1a; border: 2px solid #0f0; border-radius: 24px; padding: 25px; max-width: 500px; width: 95%; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; margin: 10px; }
        input { background: #333; border: 1px solid #0f0; color: #fff; padding: 12px; border-radius: 8px; font-size: 18px; width: 85%; margin: 10px 0; }
        
        .countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; color: #fff; z-index: 150; pointer-events: none; display: none; }
        
        /* 引導虛線與紅點 */
        .guide-line { position: absolute; left: 0; width: 100%; border-top: 2px dashed rgba(255,255,255,0.4); z-index: 90; display: flex; justify-content: center; pointer-events: none; }
        .top-line { top: 20%; }
        .bottom-line { bottom: 10%; border-top: 2px dashed rgba(100,255,100,0.4); }
        .red-dot { position: absolute; width: 12px; height: 12px; background-color: #ff0000; border-radius: 50%; box-shadow: 0 0 10px #ff0000; animation: blink 2s infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }
        
        #report-img-container img { width: 100%; border: 1px solid #fff; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="step-prepare" class="overlay">
        <div class="modal">
            <h2 style="color:#0f0">康富物理治療檢測</h2>
            <p style="color:#ccc">個案資訊登錄</p>
            <input type="text" id="patient-name" placeholder="個案姓名" value="蔡忠憲">
            <input type="text" id="patient-id" placeholder="序號" value="001">
            <br>
            <button id="btn-start" onclick="startFlow()">開始檢測流程</button>
        </div>
    </div>

    <div id="status-monitor" style="display:none;">
        <div class="status-item"><div class="status-label">模式</div><div id="val-mode" class="status-value">---</div></div>
        <div class="status-item"><div class="status-label">角度</div><div id="val-angle" class="status-value">0.0°</div></div>
        <div class="status-item"><div class="status-label">姿態判讀</div><div id="val-label" class="status-value">---</div></div>
        <div class="status-item"><div class="status-label">肩膀點位</div><div id="val-marker" class="status-value">偵測中</div></div>
    </div>

    <div id="step-next-alert" class="overlay" style="display:none;">
        <div class="modal">
            <h2 id="next-title">檢測完成</h2>
            <p id="next-msg" style="color:#ccc;"></p>
            <button id="next-btn"></button>
        </div>
    </div>

    <div id="countdown-display" class="countdown">5</div>
    
    <div class="guide-line top-line"><div class="red-dot"></div></div>
    <div class="guide-line bottom-line"></div>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <canvas id="report-gen-canvas" width="800" height="1200" style="display:none;"></canvas>

    <div id="report-preview-layer" class="overlay" style="display:none;">
        <div class="modal">
            <h2 style="color:#0f0">個案檢測報告</h2>
            <div id="report-img-container"></div>
            <p style="color:#ffff00; font-size: 14px; margin-top:10px;">請點擊分享按鈕儲存至相簿</p>
            <button onclick="shareReport()">儲存 / 分享報告圖</button>
            <button onclick="location.reload()" style="background:#444; color:white;">完成</button>
        </div>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btnStart = document.getElementById('btn-start');
        
        let currentMode = 'IDLE', isStable = false, stabilityCounter = 0, lastAngle = 0;
        let smaBuffer = [], reportData = { name: "", id: "", date: "", frontal: null, lateral: null }, finalBlob = null;

        function normalizeAngle(angle) {
            while (angle > 180) angle -= 360;
            while (angle < -180) angle += 360;
            return angle;
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults((results) => {
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks && currentMode !== 'IDLE') {
                const lms = results.poseLandmarks;
                const isShouldersInFrame = (lms[11].visibility > 0.6 && lms[12].visibility > 0.6);
                const markerStatus = document.getElementById('val-marker');
                
                if (!isShouldersInFrame) {
                    markerStatus.innerText = "❌ 遺失"; markerStatus.style.color = "#ff5555";
                    stabilityCounter = 0;
                } else {
                    markerStatus.innerText = "✅ 正常"; markerStatus.style.color = "#00ff00";
                }

                let currentAngle = 0, label = "", modeTitle = "";

                if (currentMode === 'FRONTAL') {
                    const headRad = Math.atan2(lms[5].y - lms[2].y, lms[5].x - lms[2].x);
                    const shRad = Math.atan2(lms[12].y - lms[11].y, lms[12].x - lms[11].x);
                    currentAngle = normalizeAngle((headRad - shRad) * 180 / Math.PI);
                    label = currentAngle > 1.5 ? "左偏 (L)" : (currentAngle < -1.5 ? "右偏 (R)" : "中立");
                    modeTitle = "頸肩";
                } else if (currentMode === 'LATERAL') {
                    const side = lms[11].visibility > lms[12].visibility ? 11 : 12;
                    const ear = (side === 11) ? 7 : 8;
                    const dx = lms[ear].x - lms[side].x, dy = -(lms[ear].y - lms[side].y);
                    let rawA = Math.atan2(dx, dy) * 180 / Math.PI;
                    const isFacingLeft = lms[0].x < ((lms[7].x + lms[8].x) / 2);
                    if (isFacingLeft) label = rawA < -2 ? "前傾 (Fwd)" : "後傾 (Bwd)";
                    else label = rawA > 2 ? "前傾 (Fwd)" : "後傾 (Bwd)";
                    currentAngle = rawA;
                    modeTitle = "頸胸";
                }

                smaBuffer.push(currentAngle);
                if(smaBuffer.length > 15) smaBuffer.shift();
                const avgAngle = smaBuffer.reduce((a, b) => a + b, 0) / smaBuffer.length;
                
                document.getElementById('val-mode').innerText = modeTitle;
                document.getElementById('val-angle').innerText = `${Math.abs(avgAngle).toFixed(1)}°`;
                document.getElementById('val-label').innerText = label;

                if (isShouldersInFrame) {
                    if (Math.abs(avgAngle - lastAngle) < (currentMode === 'FRONTAL' ? 0.5 : 1.2)) {
                        stabilityCounter++;
                        if (stabilityCounter >= 40 && !isStable) { isStable = true; startCountdown(avgAngle, label); }
                    } else { if(!isStable) stabilityCounter = 0; }
                }
                lastAngle = avgAngle;
                drawConnectors(canvasCtx, lms, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });

        window.startFlow = async () => {
            btnStart.innerText = "相機啟動中...";
            try {
                await camera.start();
                reportData.name = document.getElementById('patient-name').value;
                reportData.id = document.getElementById('patient-id').value;
                const now = new Date();
                reportData.date = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
                document.getElementById('step-prepare').style.display = 'none';
                document.getElementById('status-monitor').style.display = 'flex';
                currentMode = 'FRONTAL';
            } catch (err) { alert("相機啟動失敗，請檢查權限。"); }
        };

        function startCountdown(angle, label) {
            const cd = document.getElementById('countdown-display');
            cd.style.display = 'block';
            let timer = 5; cd.innerText = timer;
            let itv = setInterval(() => {
                timer--; cd.innerText = timer;
                if (timer <= 0) { clearInterval(itv); cd.style.display = 'none'; captureStep(angle, label); }
            }, 1000);
        }

        function captureStep(angle, label) {
            const snapshot = canvasElement.toDataURL("image/jpeg", 0.9);
            if (currentMode === 'FRONTAL') {
                reportData.frontal = { img: snapshot, angle: Math.abs(angle).toFixed(1), label: label };
                currentMode = 'IDLE';
                showModal("正面完成", "請引導個案轉向「側面」。", "進入側面檢測", () => {
                    document.getElementById('step-next-alert').style.display = 'none';
                    currentMode = 'LATERAL'; stabilityCounter = 0; isStable = false;
                });
            } else {
                reportData.lateral = { img: snapshot, angle: Math.abs(angle).toFixed(1), label: label };
                currentMode = 'IDLE'; generateReport();
            }
        }

        async function generateReport() {
            const c = document.getElementById('report-gen-canvas');
            const ctx = c.getContext('2d');
            ctx.fillStyle = "white"; ctx.fillRect(0,0,800,1200);
            ctx.fillStyle = "#004d40"; ctx.fillRect(0,0,800,110);
            ctx.fillStyle = "white"; ctx.font = "bold 38px sans-serif"; ctx.fillText("康富物理治療檢測報告", 40, 70);
            ctx.fillStyle = "#333"; ctx.font = "22px sans-serif";
            ctx.fillText(`個案姓名: ${reportData.name}`, 40, 160);
            ctx.fillText(`檢測序號: ${reportData.id}`, 320, 160);
            ctx.fillText(`日期: ${reportData.date}`, 580, 160);
            
            const loadImg = (src) => new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
            const drawBoxedImage = (img, x, y, w, h) => {
                const imgAspect = img.width / img.height;
                let drawW = w, drawH = w / imgAspect;
                if (drawH > h) { drawH = h; drawW = h * imgAspect; }
                const offsetX = x + (w - drawW) / 2;
                const offsetY = y + (h - drawH) / 2;
                ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.strokeRect(offsetX-2, offsetY-2, drawW+4, drawH+4);
                ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
            };

            const imgF = await loadImg(reportData.frontal.img);
            drawBoxedImage(imgF, 40, 210, 340, 480);
            ctx.fillStyle = "#004d40"; ctx.font = "bold 22px sans-serif"; ctx.fillText("【正面：頸肩夾角】", 40, 730);
            ctx.fillStyle = "#333"; ctx.font = "22px sans-serif";
            ctx.fillText(`偏移狀態: ${reportData.frontal.label}`, 40, 765);
            ctx.fillText(`量測角度: ${reportData.frontal.angle}°`, 40, 800);

            const imgL = await loadImg(reportData.lateral.img);
            drawBoxedImage(imgL, 420, 210, 340, 480);
            ctx.fillStyle = "#004d40"; ctx.font = "bold 22px sans-serif"; ctx.fillText("【側面：頸胸夾角】", 420, 730);
            ctx.fillStyle = "#333"; ctx.font = "22px sans-serif";
            ctx.fillText(`姿態判讀: ${reportData.lateral.label}`, 420, 765);
            ctx.fillText(`量測角度: ${reportData.lateral.angle}°`, 420, 800);
            
            ctx.fillStyle = "#aaa"; ctx.font = "italic 16px sans-serif"; ctx.fillText("康富物理治療體系 版權所有。", 40, 1160);

            const finalDataUrl = c.toDataURL("image/jpeg", 0.9);
            const reportImg = new Image(); reportImg.src = finalDataUrl;
            document.getElementById('report-img-container').innerHTML = '';
            document.getElementById('report-img-container').appendChild(reportImg);
            document.getElementById('report-preview-layer').style.display = 'flex';
            const res = await fetch(finalDataUrl); finalBlob = await res.blob();
        }

        window.shareReport = async () => {
            const fileName = `${reportData.date}-${reportData.name}-${reportData.id}.jpg`;
            const file = new File([finalBlob], fileName, { type: 'image/jpeg' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: '康富檢測報告' }); } catch (err) {}
            } else { alert("長按圖片儲存影像。"); }
        };

        function showModal(t, m, b, a) {
            document.getElementById('next-title').innerText = t;
            document.getElementById('next-msg').innerText = m;
            const btn = document.getElementById('next-btn');
            btn.innerText = b; btn.onclick = a;
            document.getElementById('step-next-alert').style.display = 'flex';
        }
    </script>
</body>
</html>

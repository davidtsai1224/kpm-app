<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>KPM 姿態分析 - 直覺修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #status-monitor { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; z-index: 100; font-size: 16px; border: 2px solid #0f0; border-radius: 10px; }
        .container { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #output_canvas { max-width: 100%; max-height: 100%; object-fit: contain; transform: scaleX(-1); } 
        #input_video { display: none; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; background: #0f0; color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 101; }
    </style>
</head>
<body>
    <div id="status-monitor">
        <div style="font-weight: bold; color: #fff;">KPM POSTURE AI</div>
        <hr style="border: 0.5px solid #333; margin: 10px 0;">
        <div id="angle-info" style="font-size: 22px; color: #ffff00; white-space: pre-line;">等待啟動...</div>
    </div>

    <button id="start-btn">開始檢測</button>
    
    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btn = document.getElementById('start-btn');
        const angleInfo = document.getElementById('angle-info');

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
        }});

        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        pose.onResults((results) => {
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                const L = landmarks[11]; // AI 原始左肩
                const R = landmarks[12]; // AI 原始右肩

                // 核心修正：直接對調文字邏輯
                // 前鏡頭下，你動右手時，AI 其實抓到的是它的左點位 (L)
                let sideStatus = "肩部水平";
                let angleDeg = 0;

                if (L.y < R.y - 0.005) {
                    // 當 AI 抓到的左點位(L)比較高，實際上是你(受測者)的右肩高
                    angleDeg = (Math.abs(L.y - R.y) * 100).toFixed(1); // 簡化計算顯示
                    sideStatus = "【受測者：右肩較高】";
                } else if (R.y < L.y - 0.005) {
                    // 當 AI 抓到的右點位(R)比較高，實際上是你(受測者)的左肩高
                    angleDeg = (Math.abs(L.y - R.y) * 100).toFixed(1);
                    sideStatus = "【受測者：左肩較高】";
                }

                drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 5});

                angleInfo.innerText = `${sideStatus}\n偏離係數: ${angleDeg}`;
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });

        btn.onclick = () => {
            btn.style.display = 'none';
            camera.start();
        };
    </script>
</body>
</html>
